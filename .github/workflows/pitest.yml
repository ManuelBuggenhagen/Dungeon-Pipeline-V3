name: Mutation Testing

on:
    workflow_dispatch:

jobs:
    pitest:
        name: Run Pitest on Dungeon Contrib
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Setup Java 25
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: '25'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Make Gradle executable
              run: chmod +x ./gradlew

            - name: Run Pitest
              run: ./gradlew :dungeon:pitest --continue

            - name: Upload Pitest HTML Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: pitest-html-report
                  path: dungeon/build/reports/pitest/
                  if-no-files-found: error
                  retention-days: 7
